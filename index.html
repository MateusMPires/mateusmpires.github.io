<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecos | Coleção de Insights</title>
    <meta name="description" content="Um espaço seguro e minimalista frases que te marcam.">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* 2. Aplicando a fonte Manrope em todo o corpo do site */
        body { font-family: 'Manrope', sans-serif; }
    </style>
</head>
<body class="bg-white text-gray-900 dark:bg-gray-950 dark:text-gray-100 min-h-screen flex flex-col relative">

    <div class="fixed inset-0 z-[-1] bg-[#F2F2F7] opacity-10 dark:hidden" aria-hidden="true"></div>

    <div class="relative z-10 flex-grow flex flex-col">
        <header class="w-full max-w-5xl mx-auto p-6 flex justify-between items-center">
            <div class="flex items-center gap-3">
            
                
                <span class="font-semibold text-xl tracking-tight">Ecos</span>
            </div>
            <a href="mailto:mateusmp.df@icloud.com" class="text-sm font-medium text-gray-500 hover:text-gray-900 dark:text-gray-400 dark:hover:text-white transition-colors">
                Suporte
            </a>
        </header>

        <main class="flex-grow flex flex-col items-center justify-center px-6 text-center mt-10 md:mt-20">
            
            <img src="logo.png" alt="Logo Ecos" class="w-20 h-20 mb-6 rounded-2xl shadow-md object-cover">

            <h1 class="text-5xl md:text-7xl font-bold tracking-tight mb-6 max-w-3xl leading-tight">
                Sua coleção pessoal de insights.
            </h1>
            
            <p class="text-lg md:text-xl text-gray-600 dark:text-gray-300 mb-10 max-w-2xl leading-relaxed">
                Ecos combina widgets, notificações e templates dentro de um inteligente sistema de reflexão diária.
            </p>

            <a href="https://apps.apple.com/us/app/ecos-sua-segunda-mente/id6754569860" target="_blank" rel="noopener noreferrer" class="transition transform hover:scale-105">
                <img src="https://tools.applemediaservices.com/api/badges/download-on-the-app-store/black/pt-br?size=250x83&amp;releaseDate=12765600&h=d2fbff4bc4b3017bb59bf0f1af97652c" alt="Download on the App Store" class="h-14 md:h-16">
            </a>

            <div class="mt-16 md:mt-20 w-full max-w-lg mx-auto px-4 flex justify-center">
                <img src="template-trio.png" 
                     alt="Captura de tela do aplicativo Ecos" 
                     class="w-[115%] max-w-none mx-auto h-auto rounded-2xl shadow-xl">
            </div>
        </main>

        <footer class="w-full text-center py-8 mt-16 text-sm text-gray-500 dark:text-gray-400 border-t border-gray-200 dark:border-gray-800 relative z-10">
            <p>© 2026 Ecos. Desenvolvido no Brasil.</p>
            <div class="mt-2 space-x-4">
                <a href="#" class="hover:text-gray-900 dark:hover:text-white transition-colors">Política de Privacidade</a>
                <a href="#" class="hover:text-gray-900 dark:hover:text-white transition-colors">Termos de Uso</a>
            </div>
        </footer>
    </div>

</body>
</html>
